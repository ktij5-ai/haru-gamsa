<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하루감사 · Haru Gamsa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f8f6f2;
      color: #333;
      line-height: 1.8;
      text-align: center;
    }
    header {
      background: linear-gradient(135deg, #4a9aba 0%, #2d7a9a 100%);
      color: white;
      padding: 80px 24px 60px;
    }
    header .emoji { font-size: 64px; margin-bottom: 16px; }
    header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    header p { font-size: 16px; opacity: 0.85; }
    .container {
      max-width: 480px;
      margin: 40px auto;
      padding: 0 24px 80px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card p { font-size: 15px; color: #555; margin-bottom: 16px; }
    .privacy-link {
      display: inline-block;
      padding: 12px 32px;
      background: #4a9aba;
      color: white;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }
    .privacy-link:hover { background: #2d7a9a; }
  </style>
</head>
<body>
  <header>
    <div class="emoji">🌊</div>
    <h1>하루감사 · Haru Gamsa</h1>
    <p>감사 일기로 일상의 소중한 순간을 기록하세요</p>
  </header>
  <div class="container">
    <div class="card">
      <p>하루감사는 매일 감사한 일을 기록하며 긍정적인 습관을 만들어가는 앱입니다.</p>
      <a href="https://haru-gamsa.com/privacy.html" class="privacy-link">
        🔒 개인정보처리방침 · Privacy Policy
      </a>
    </div>
  </div>
</body>
</html>
